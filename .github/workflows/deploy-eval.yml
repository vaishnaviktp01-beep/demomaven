name: Deploy Apigee Proxy to Eval

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Apigee environment'
        required: true
        default: 'eval'
        type: choice
        options:
          - eval

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'
  APIGEE_ENV: ${{ github.event.inputs.environment || 'eval' }}

jobs:
  # ── Job 1: Lint ─────────────────────────────────────────────────────────────
  lint:
    name: Lint Proxy Bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Lint Apigee proxy with apigeelint
        run: npm run lint

  # ── Job 2: Deploy to Eval via Maven ─────────────────────────────────────────
  deploy-eval:
    name: Deploy to Eval (Maven)
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    environment:
      name: eval
      url: https://${{ secrets.APIGEE_ORG }}-eval.apigee.net/v1/hello

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          token_format: access_token

      - name: Deploy proxy to Eval with Maven
        run: |
          mvn clean install \
            -P eval \
            -Dapigee.org=${{ secrets.APIGEE_ORG }} \
            -Dapigee.authtype=oauth \
            -Dapigee.credential=${{ steps.auth.outputs.access_token }} \
            --no-transfer-progress

  # ── Job 3: Integration Tests ─────────────────────────────────────────────────
  integration-test:
    name: Integration Tests (Eval)
    needs: deploy-eval
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run integration tests against Eval
        env:
          APIGEE_ORG: ${{ secrets.APIGEE_ORG }}
          APIGEE_ENV: ${{ env.APIGEE_ENV }}
          APIGEE_PROXY_NAME: ${{ secrets.APIGEE_PROXY_NAME }}
        run: npm test
